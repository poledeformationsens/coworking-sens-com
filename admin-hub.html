<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Back-office — L'Atelier du Coworking</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Playfair+Display:wght@600;700;800&display=swap" rel="stylesheet">
<style>
  :root{ --navy:#03234D; --navy2:#06163a; --gold:#C9B584; --cream:#F8F7F4; --slate:#9fb0cc; }
  *{box-sizing:border-box; margin:0; padding:0}
  html,body{height:100%}
  body{font-family:'Inter',-apple-system,sans-serif; background:var(--navy); color:#fff; overflow:hidden}
  /* Fond animé */
  #bg{position:fixed; inset:0; z-index:0}
  .glow{position:fixed; border-radius:50%; filter:blur(70px); opacity:.5; z-index:0; pointer-events:none}
  .g1{width:520px;height:520px;background:#0a4b8c;top:-160px;left:-120px;animation:float1 18s ease-in-out infinite}
  .g2{width:460px;height:460px;background:#C9B58455;bottom:-180px;right:-120px;animation:float2 22s ease-in-out infinite}
  .g3{width:380px;height:380px;background:#0e2a5e;top:40%;left:55%;animation:float3 26s ease-in-out infinite}
  @keyframes float1{0%,100%{transform:translate(0,0)}50%{transform:translate(120px,80px)}}
  @keyframes float2{0%,100%{transform:translate(0,0)}50%{transform:translate(-100px,-70px)}}
  @keyframes float3{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(-80px,60px) scale(1.15)}}

  .stage{position:relative; z-index:2; height:100%; display:flex; align-items:center; justify-content:center; padding:32px}
  .slide{display:none; width:min(960px,92vw); animation:fade .6s ease}
  .slide.active{display:block}
  @keyframes fade{from{opacity:0; transform:translateY(18px)}to{opacity:1; transform:translateY(0)}}

  .kicker{display:inline-block; font-size:13px; letter-spacing:.22em; text-transform:uppercase; color:var(--gold); margin-bottom:14px}
  .glass{background:rgba(255,255,255,.06); border:1px solid rgba(201,181,132,.35); border-radius:24px; padding:48px; backdrop-filter:blur(12px); box-shadow:0 30px 80px rgba(0,0,0,.35)}
  .ico{font-size:54px; margin-bottom:12px}
  h1{font-family:'Playfair Display',serif; font-size:clamp(30px,5vw,52px); line-height:1.05; margin-bottom:10px}
  h2{font-family:'Playfair Display',serif; font-size:clamp(26px,4vw,42px); margin-bottom:14px}
  p.lead{font-size:clamp(15px,2vw,19px); color:#e7eaf2; line-height:1.6; max-width:620px}
  ul.feat{list-style:none; margin:20px 0 28px; display:grid; grid-template-columns:1fr 1fr; gap:10px 26px; max-width:640px}
  ul.feat li{font-size:15px; color:#dfe5f0; padding-left:24px; position:relative}
  ul.feat li::before{content:"◆"; color:var(--gold); position:absolute; left:0; font-size:11px; top:3px}
  @media(max-width:640px){ul.feat{grid-template-columns:1fr} .glass{padding:30px}}

  .cta{display:inline-flex; align-items:center; gap:10px; background:var(--gold); color:var(--navy); text-decoration:none; font-weight:800; font-size:16px; padding:15px 28px; border-radius:14px; transition:transform .15s, box-shadow .15s; box-shadow:0 10px 30px rgba(201,181,132,.25)}
  .cta:hover{transform:translateY(-2px); box-shadow:0 16px 40px rgba(201,181,132,.4)}
  .cta .arrow{transition:transform .15s}
  .cta:hover .arrow{transform:translateX(4px)}

  /* grille de modules sur slide cover */
  .grid{display:grid; grid-template-columns:repeat(3,1fr); gap:14px; margin-top:30px}
  @media(max-width:640px){.grid{grid-template-columns:repeat(2,1fr)}}
  .tile{background:rgba(255,255,255,.05); border:1px solid rgba(255,255,255,.12); border-radius:16px; padding:18px; text-decoration:none; color:#fff; transition:.18s; display:block}
  .tile:hover{background:rgba(201,181,132,.16); border-color:var(--gold); transform:translateY(-3px)}
  .tile .ti{font-size:26px}
  .tile .tt{font-weight:700; margin-top:8px; font-size:14.5px}
  .tile .td{font-size:12px; color:var(--slate); margin-top:3px}

  /* Contrôles */
  .controls{position:fixed; z-index:5; bottom:26px; left:50%; transform:translateX(-50%); display:flex; align-items:center; gap:18px}
  .nav-btn{width:46px; height:46px; border-radius:50%; border:1px solid rgba(201,181,132,.5); background:rgba(255,255,255,.07); color:#fff; font-size:20px; cursor:pointer; backdrop-filter:blur(8px); transition:.15s}
  .nav-btn:hover{background:var(--gold); color:var(--navy)}
  .dots{display:flex; gap:9px}
  .dot{width:9px; height:9px; border-radius:50%; background:rgba(255,255,255,.3); cursor:pointer; transition:.15s}
  .dot.active{background:var(--gold); transform:scale(1.3)}
  .counter{position:fixed; top:24px; right:30px; z-index:5; font-size:13px; color:var(--slate); letter-spacing:.1em}
  .brand{position:fixed; top:22px; left:30px; z-index:5; display:flex; align-items:center; gap:10px}
  .brand img{width:38px;height:38px}
  .brand span{font-family:'Playfair Display',serif; font-size:16px}
  .backbtn{position:fixed; top:20px; right:30px; z-index:6; display:inline-flex; align-items:center; gap:8px; background:rgba(255,255,255,.08); border:1px solid rgba(201,181,132,.5); color:#fff; text-decoration:none; font-size:13px; font-weight:600; padding:9px 16px; border-radius:12px; backdrop-filter:blur(8px); transition:.15s}
  .backbtn:hover{background:var(--gold); color:var(--navy)}
  .hint{position:fixed; bottom:8px; left:50%; transform:translateX(-50%); z-index:5; font-size:11px; color:rgba(255,255,255,.35)}
</style>
<style>/* ACW-RESPONSIVE */
@media (max-width:820px){
  html,body{overflow-x:hidden !important;max-width:100vw !important}
  header{flex-wrap:wrap !important;padding:12px 14px !important;gap:8px !important}
  header > div{min-width:0 !important;max-width:100% !important}
  header > div > div{min-width:0 !important;max-width:100% !important}
  header h1{font-size:17px !important}
  header img{width:38px !important;height:38px !important}
  nav{display:flex !important;gap:6px !important;flex-wrap:nowrap !important;overflow-x:auto !important;width:100% !important;max-width:100% !important;-webkit-overflow-scrolling:touch;padding-bottom:4px;margin-top:8px !important}
  nav a{white-space:nowrap !important;flex:0 0 auto !important;font-size:12px !important;padding:6px 10px !important}
  .wrap{padding:0 12px !important;margin:16px auto !important;max-width:100% !important}
  .card{padding:14px !important;overflow-x:auto;max-width:100%}
  .grid,.kpis{grid-template-columns:repeat(2,1fr) !important}
  .modal-grid{grid-template-columns:1fr !important}
  .toolbar{flex-wrap:wrap !important}
  .toolbar input,.toolbar select,.toolbar .chip{flex:1 1 100% !important;width:100% !important}
  .card table{min-width:520px}
  .fc,.fc table,.fc-scrollgrid,.fc-scrollgrid table,.fc .fc-view-harness{min-width:0 !important;width:100% !important;max-width:100% !important}
  .fc .fc-daygrid-day-number{font-size:12px}
  .fc .fc-daygrid-event{font-size:9.5px !important;padding:1px 3px !important}
  .modal,.modal-box,.box{max-width:94vw !important;width:94vw !important}
  h1,h2,.h1{font-size:20px !important}
  .fc .fc-toolbar.fc-header-toolbar{flex-direction:column;gap:8px;align-items:stretch}
  .fc-toolbar-title{font-size:18px !important}
  .fc .fc-toolbar-chunk{display:flex;justify-content:center;flex-wrap:wrap;gap:4px}
}
@media (max-width:480px){
  .grid,.kpis{grid-template-columns:1fr !important}
  nav a{font-size:11px !important;padding:5px 8px !important}
  header h1{font-size:16px !important}
}
</style>
<!-- ACW-PWA -->
<link rel="manifest" href="/manifest.webmanifest">
<meta name="theme-color" content="#03234D">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ACW Admin">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<link rel="icon" type="image/png" href="/icon-192.png">
</head>
<body>
<canvas id="bg"></canvas>
<div class="glow g1"></div><div class="glow g2"></div><div class="glow g3"></div>

<div class="brand">
  <img src="https://coworking-sens.com/acw-logo-white.png" alt="ACW" onerror="this.style.display='none'">
  <span>Back-office</span>
</div>
<a class="backbtn" href="https://coworking-sens.com/admin-devis-dashboard">← Retour au back-office</a>
<div class="counter" style="top:64px"><span id="cur">1</span> / <span id="tot">1</span></div>

<div class="stage" id="stage"></div>

<div class="controls">
  <button class="nav-btn" onclick="go(-1)">‹</button>
  <div class="dots" id="dots"></div>
  <button class="nav-btn" onclick="go(1)">›</button>
</div>
<div class="hint">← → ou espace pour naviguer · clique un module pour l'ouvrir</div>

<script>
const BASE = 'https://coworking-sens.com';
const MODULES = [
  {ico:'👤', kicker:'CRM', title:'Clients', url:'/admin-clients',
   lead:"Le cœur de votre relation client : retrouvez chaque coworker, ouvrez sa fiche et pilotez tout depuis un seul endroit.",
   feat:['Recherche par nom, email, société','Fiche : réservations, CA généré','Avis Google ou invitation','Notes internes & tags','Reset mot de passe','Réserver pour le client']},
  {ico:'📊', kicker:'Pilotage', title:'Statistiques', url:'/admin-stats',
   lead:"Votre tableau de bord : chiffre d'affaires, taux d'occupation et comparaison avec la période précédente.",
   feat:['CA & occupation en direct','CA par offre','CA par catégorie','Fréquentation des espaces','Évolution mensuelle','Exports CSV']},
  {ico:'📅', kicker:'Réservations', title:'Calendrier', url:'/admin-calendar',
   lead:"Visualisez et gérez toutes les réservations de l'atelier, et réservez au nom d'un client.",
   feat:['Vue agenda par espace','Détail de chaque réservation','Réserver pour un client','Génération de code PIN']},
  {ico:'🎟️', kicker:'Fidélité', title:'Forfaits', url:'/admin-forfaits',
   lead:"Gérez les packs et crédits de vos coworkers : attribution, suivi de la consommation et solde restant.",
   feat:['Créer / créditer un forfait','Suivi crédits utilisés','Solde par client','Historique de consommation']},
  {ico:'📋', kicker:'Facturation', title:'Devis & Factures', url:'/admin-devis-dashboard',
   lead:"Le pôle devis : créez, envoyez, suivez les acomptes et les paiements, et éditez les factures PDF.",
   feat:['Création de devis','Envoi au client','Suivi acompte / solde','Factures PDF']},
  {ico:'🎉', kicker:'Animation', title:'Événements', url:'/admin-evenements',
   lead:"Créez vos Matinales Network et autres événements, et suivez les inscriptions des coworkers.",
   feat:['Créer un événement','Suivi des inscrits','Capacité & places restantes','Page publique /evenements']},
  {ico:'🚫', kicker:'Disponibilités', title:'Fermetures', url:'/admin-fermetures',
   lead:"Bloquez des créneaux ou des journées entières (congés, privatisations) avec un motif visible par les clients.",
   feat:['Fermeture sur une plage de dates','Motif obligatoire','Par espace ou atelier entier','Affiché côté réservation']},
  {ico:'📤', kicker:'Comptabilité', title:'Exports', url:'/admin-exports',
   lead:"Tous vos exports en un clic : comptable, réservations, clients — au format CSV prêt pour votre expert-comptable.",
   feat:['Export comptable HT/TVA/TTC','Export réservations','Export clients','Synthèse statistique']},
  {ico:'🎯', kicker:'Développement', title:'Prospection', url:'/admin-prospection',
   lead:"Votre pipeline commercial unique : tous les prospects du jour, profil DISC, accroche personnalisée et suivi des statuts.",
   feat:['Prospects du jour automatiques','Profil DISC + lecture du profil','Statuts cliquables (contacté, client…)','Suivi envois & réponses','Exclusion des contacts déjà connus','Ajout manuel']},
  {ico:'📄', kicker:'Gestion', title:'Documents', url:'/admin-documents',
   lead:"Toutes vos factures, avoirs et devis au même endroit, avec leur PDF — recherche et filtres par type.",
   feat:['Factures, avoirs & devis unifiés','PDF de chaque document','Factures historiques générées à la volée','CA facturé & total avoirs','Recherche client / référence']},
];

const stage = document.getElementById('stage');
const slides = [];

// Slide de couverture
const cover = document.createElement('div');
cover.className = 'slide active';
cover.innerHTML = `
  <div class="glass">
    <span class="kicker">L'Atelier du Coworking · Sens</span>
    <h1>Votre back-office,<br>en un coup d'œil.</h1>
    <p class="lead">Tous les outils pour piloter l'atelier : clients, statistiques, réservations, facturation. Cliquez sur un module pour l'ouvrir directement.</p>
    <div class="grid">
      ${MODULES.map(m=>`<a class="tile" href="${BASE}${m.url}" target="_blank" rel="noopener">
        <div class="ti">${m.ico}</div><div class="tt">${m.title}</div><div class="td">${m.kicker}</div></a>`).join('')}
    </div>
  </div>`;
stage.appendChild(cover);
slides.push(cover);

// Une slide détaillée par module
MODULES.forEach(m=>{
  const s = document.createElement('div');
  s.className = 'slide';
  s.innerHTML = `
    <div class="glass">
      <div class="ico">${m.ico}</div>
      <span class="kicker">${m.kicker}</span>
      <h2>${m.title}</h2>
      <p class="lead">${m.lead}</p>
      <ul class="feat">${m.feat.map(f=>`<li>${f}</li>`).join('')}</ul>
      <a class="cta" href="${BASE}${m.url}" target="_blank" rel="noopener">Ouvrir la page <span class="arrow">→</span></a>
    </div>`;
  stage.appendChild(s);
  slides.push(s);
});

// Navigation
let idx = 0;
const dotsEl = document.getElementById('dots');
slides.forEach((_,i)=>{
  const d = document.createElement('div'); d.className='dot'+(i===0?' active':'');
  d.onclick=()=>show(i); dotsEl.appendChild(d);
});
document.getElementById('tot').textContent = slides.length;
function show(i){
  idx = (i+slides.length)%slides.length;
  slides.forEach((s,j)=>s.classList.toggle('active', j===idx));
  [...dotsEl.children].forEach((d,j)=>d.classList.toggle('active', j===idx));
  document.getElementById('cur').textContent = idx+1;
}
function go(d){ show(idx+d); }
document.addEventListener('keydown', e=>{
  if(e.key==='ArrowRight'||e.key===' ') go(1);
  if(e.key==='ArrowLeft') go(-1);
});

// Fond animé : réseau de particules dorées
const cv = document.getElementById('bg'), ctx = cv.getContext('2d');
let pts=[], W,H;
function resize(){ W=cv.width=innerWidth; H=cv.height=innerHeight; }
resize(); addEventListener('resize', resize);
const N = Math.min(70, Math.floor(innerWidth/22));
for(let i=0;i<N;i++) pts.push({x:Math.random()*W, y:Math.random()*H, vx:(Math.random()-.5)*.35, vy:(Math.random()-.5)*.35});
function draw(){
  ctx.clearRect(0,0,W,H);
  for(const p of pts){
    p.x+=p.vx; p.y+=p.vy;
    if(p.x<0||p.x>W) p.vx*=-1; if(p.y<0||p.y>H) p.vy*=-1;
  }
  for(let i=0;i<pts.length;i++){
    for(let j=i+1;j<pts.length;j++){
      const a=pts[i], b=pts[j], dx=a.x-b.x, dy=a.y-b.y, dist=Math.hypot(dx,dy);
      if(dist<130){
        ctx.strokeStyle='rgba(201,181,132,'+(0.14*(1-dist/130))+')';
        ctx.lineWidth=1; ctx.beginPath(); ctx.moveTo(a.x,a.y); ctx.lineTo(b.x,b.y); ctx.stroke();
      }
    }
  }
  for(const p of pts){
    ctx.fillStyle='rgba(201,181,132,.55)';
    ctx.beginPath(); ctx.arc(p.x,p.y,1.8,0,Math.PI*2); ctx.fill();
  }
  requestAnimationFrame(draw);
}
draw();
</script>
<script>/* ACW-PWA-REG */
if('serviceWorker' in navigator){window.addEventListener('load',function(){navigator.serviceWorker.register('/sw.js').catch(function(){});});}
</script>
</body>
</html>
