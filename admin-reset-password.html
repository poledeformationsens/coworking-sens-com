<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Réinitialiser le mot de passe admin — L'Atelier du Coworking</title>
<style>
  :root{ --navy:#03234D; --gold:#C9B584; --slate:#5A6A85; --light:#E5DDCB; --coral:#EA584A; --green:#1D9E75; }
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;background:var(--navy);font-family:-apple-system,'Segoe UI',Arial,sans-serif;
    display:flex;align-items:center;justify-content:center;padding:24px;}
  .card{background:#fff;padding:40px 36px;border-radius:8px;width:400px;max-width:100%;box-shadow:0 8px 32px rgba(0,0,0,.2);}
  img{display:block;margin:0 auto 14px;}
  h1{margin:0 0 6px;font-family:'Cormorant Garamond',Georgia,serif;color:var(--navy);font-size:24px;text-align:center;font-weight:600;}
  .sub{margin:0 0 26px;text-align:center;font-size:11px;color:var(--gold);letter-spacing:3px;text-transform:uppercase;}
  label{display:block;font-size:11px;color:var(--slate);letter-spacing:1px;text-transform:uppercase;margin-bottom:6px;font-weight:600;}
  input{width:100%;padding:11px 14px;border:1px solid var(--light);border-radius:4px;font-size:14px;margin-bottom:16px;font-family:inherit;color:var(--navy);}
  input:focus{outline:none;border-color:var(--navy);}
  button{width:100%;padding:13px;background:var(--navy);color:#fff;border:0;border-radius:4px;font-weight:600;font-size:14px;cursor:pointer;letter-spacing:.5px;}
  button:disabled{opacity:.5;cursor:not-allowed;}
  .hint{font-size:12px;color:var(--slate);margin:-8px 0 16px;}
  .msg{margin:14px 0 0;text-align:center;font-size:13px;display:none;}
  .msg.err{color:var(--coral);} .msg.ok{color:var(--green);}
  .back{margin:18px 0 0;text-align:center;} .back a{color:var(--slate);font-size:12px;text-decoration:underline;}
</style>
<style>/* ACW-RESPONSIVE */
@media (max-width:820px){
  html,body{overflow-x:hidden !important;max-width:100vw !important}
  header{flex-wrap:wrap !important;padding:12px 14px !important;gap:8px !important}
  header > div{min-width:0 !important;max-width:100% !important}
  header > div > div{min-width:0 !important;max-width:100% !important}
  header h1{font-size:17px !important}
  header img{width:90px !important;height:90px !important}
  nav{display:flex !important;gap:6px !important;flex-wrap:nowrap !important;overflow-x:auto !important;width:100% !important;max-width:100% !important;-webkit-overflow-scrolling:touch;padding-bottom:4px;margin-top:8px !important}
  nav a{white-space:nowrap !important;flex:0 0 auto !important;font-size:12px !important;padding:6px 10px !important}
  .wrap{padding:0 12px !important;margin:16px auto !important;max-width:100% !important}
  .card{padding:14px !important;overflow-x:auto;max-width:100%}
  .grid,.kpis{grid-template-columns:repeat(2,1fr) !important}
  .modal-grid{grid-template-columns:1fr !important}
  .toolbar{flex-wrap:wrap !important}
  .toolbar input,.toolbar select,.toolbar .chip{flex:1 1 100% !important;width:100% !important}
  .row-card{flex-wrap:wrap !important;gap:6px 12px !important;padding:12px 14px !important}
  .row-card .name{flex:1 1 100% !important;min-width:0 !important;font-size:14px !important}
  .row-card .meta{min-width:0 !important;flex:1 1 auto !important;text-align:left !important;font-size:13px !important}
  .row-card .amt{min-width:0 !important;flex:0 0 auto !important;margin-left:auto !important;font-size:15px !important}
  .row-card .bar{flex:1 1 100% !important}
  .export-card{padding:14px !important}
  .podium-row .who{min-width:0 !important}
  table.tbl-cards,table.tbl-cards tbody{display:block !important;width:100% !important;min-width:0 !important}
  table.tbl-cards thead{display:none !important}
  table.tbl-cards tr{display:block !important;border:1px solid var(--light,#E5DDCB) !important;border-radius:10px !important;padding:8px 14px !important;margin-bottom:10px !important;background:#fff !important}
  table.tbl-cards td{display:block !important;padding:6px 0 !important;border:none !important;border-bottom:1px solid #f3efe6 !important;text-align:left !important;font-size:13.5px !important;min-width:0 !important}
  table.tbl-cards td:last-child{border-bottom:none !important}
  table.tbl-cards td::before{content:attr(data-label);display:block;font-weight:700;color:var(--slate,#5A6A85);font-size:10px;text-transform:uppercase;letter-spacing:.04em;margin-bottom:2px}
  table.tbl-cards td[data-label=""]::before,table.tbl-cards td:not([data-label])::before{content:none}
  .fc,.fc table,.fc-scrollgrid,.fc-scrollgrid table,.fc .fc-view-harness{min-width:0 !important;width:100% !important;max-width:100% !important}
  .fc .fc-daygrid-day-number{font-size:12px}
  .fc .fc-daygrid-event{font-size:9.5px !important;padding:1px 3px !important}
  .modal,.modal-box,.box{max-width:94vw !important;width:94vw !important}
  h1,h2,.h1{font-size:20px !important}
  .fc .fc-toolbar.fc-header-toolbar{flex-direction:column;gap:8px;align-items:stretch}
  .fc-toolbar-title{font-size:18px !important}
  .fc .fc-toolbar-chunk{display:flex;justify-content:center;flex-wrap:wrap;gap:4px}
}
@media (max-width:480px){
  .grid,.kpis{grid-template-columns:1fr !important}
  nav a{font-size:11px !important;padding:5px 8px !important}
  header h1{font-size:16px !important}
}
</style>
<!-- ACW-PWA -->
<link rel="manifest" href="/manifest.webmanifest">
<meta name="theme-color" content="#03234D">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ACW Admin">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<link rel="icon" type="image/png" href="/icon-192.png">
</head>
<body>
<div class="card">
  <img src="https://cdn.jsdelivr.net/gh/poledeformationsens/coworking-sens-com@main/acw-logo-navy.png" alt="ACW" width="80" height="80">
  <h1>L'Atelier du Coworking</h1>
  <p class="sub">Réinitialisation admin</p>
  <form id="form" onsubmit="submitReset(event)">
    <label for="p1">Nouveau mot de passe</label>
    <input id="p1" type="password" required autocomplete="new-password">
    <label for="p2">Confirmer le mot de passe</label>
    <input id="p2" type="password" required autocomplete="new-password">
    <p class="hint">8 caractères minimum, au moins une majuscule et un chiffre.</p>
    <button id="btn" type="submit">Réinitialiser</button>
    <p id="msg" class="msg"></p>
  </form>
  <p class="back"><a href="/admin-calendar.html">← Retour à la connexion</a></p>
</div>
<script>
  const API_BASE = '/api/coworking';
  const token = new URLSearchParams(location.search).get('token') || '';
  function show(t, ok){ const m=document.getElementById('msg'); m.textContent=t; m.className='msg '+(ok?'ok':'err'); m.style.display='block'; }
  if (!token) { show("Lien invalide : token manquant. Refaites une demande depuis la page de connexion.", false); document.getElementById('btn').disabled=true; }
  async function submitReset(e){
    e.preventDefault();
    const p1=document.getElementById('p1').value, p2=document.getElementById('p2').value;
    if (p1!==p2) { show("Les deux mots de passe ne correspondent pas.", false); return; }
    const btn=document.getElementById('btn'); btn.disabled=true; const orig=btn.textContent; btn.textContent='Envoi…';
    try {
      const r=await fetch(`${API_BASE}/admin/reset-password`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({token, new_password:p1})});
      const d=await r.json().catch(()=>({}));
      if(!r.ok) throw new Error(d.detail||'Erreur');
      show("Mot de passe réinitialisé ✅ Redirection vers la connexion…", true);
      setTimeout(()=>location.href='/admin-calendar.html', 2000);
    } catch(err){ show('Erreur : '+err.message, false); btn.disabled=false; btn.textContent=orig; }
  }
</script>
<script>/* ACW-PWA-REG */
if('serviceWorker' in navigator){window.addEventListener('load',function(){navigator.serviceWorker.register('/sw.js').catch(function(){});});}
</script>
<script>/* ACW-TBL */
(function(){
  var MOBILE=820, obs=null, busy=false;
  function labelize(){
    if(window.innerWidth>MOBILE) return;
    if(obs) obs.disconnect();
    document.querySelectorAll('table').forEach(function(t){
      if(t.closest('.fc')) return;
      var ths=t.querySelectorAll('thead th');
      if(!ths.length) return;
      var labels=[].map.call(ths,function(th){return th.textContent.trim();});
      t.classList.add('tbl-cards');
      t.querySelectorAll('tbody tr').forEach(function(tr){
        [].forEach.call(tr.children,function(td,i){
          if(td.getAttribute('data-label')===null) td.setAttribute('data-label',labels[i]||'');
        });
      });
    });
    if(obs) obs.observe(document.body,{childList:true,subtree:true});
  }
  function boot(){
    labelize();
    obs=new MutationObserver(function(){
      if(busy) return; busy=true;
      requestAnimationFrame(function(){ busy=false; labelize(); });
    });
    obs.observe(document.body,{childList:true,subtree:true});
  }
  if(document.readyState!=='loading') boot(); else document.addEventListener('DOMContentLoaded',boot);
  window.addEventListener('resize',function(){ clearTimeout(window.__acwR); window.__acwR=setTimeout(labelize,200); });
})();
</script>
</body>
</html>
